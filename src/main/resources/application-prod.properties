server.port=${SERVER_PORT:8080}

# Em produção, preencha DB_URL/DB_USERNAME/DB_PASSWORD no Dokploy.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=${DB_SHOW_SQL:false}

# JWT (PROD) - obrigatório definir JWT_SECRET
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:14400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://fitmatch.page,https://www.fitmatch.page}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With}
app.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization,Location,Content-Disposition}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
