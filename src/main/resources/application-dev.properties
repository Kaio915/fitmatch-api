server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fitmatch}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.show-sql=${DB_SHOW_SQL:true}

# JWT (DEV)
# Em produção, sobrescreva via variável de ambiente JWT_SECRET.
app.jwt.secret=${JWT_SECRET:dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-123456}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://fitmatch.page,https://www.fitmatch.page,http://localhost:*,http://127.0.0.1:*,http://[::1]:*}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With}
app.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization,Location,Content-Disposition}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
