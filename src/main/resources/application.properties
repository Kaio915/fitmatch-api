spring.datasource.url=jdbc:postgresql://localhost:5432/fitmatch
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Edamam Food Database API
diet.edamam.enabled=${EDAMAM_ENABLED:true}
diet.edamam.app-id=${EDAMAM_APP_ID:}
diet.edamam.app-key=${EDAMAM_APP_KEY:}
diet.edamam.base-url=${EDAMAM_BASE_URL:https://api.edamam.com}
diet.edamam.account-user=${EDAMAM_ACCOUNT_USER:}

