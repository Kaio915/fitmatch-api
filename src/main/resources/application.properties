spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Edamam Food Database API
diet.edamam.enabled=${EDAMAM_ENABLED:true}
diet.edamam.app-id=${EDAMAM_APP_ID:}
diet.edamam.app-key=${EDAMAM_APP_KEY:}
diet.edamam.base-url=${EDAMAM_BASE_URL:https://api.edamam.com}
diet.edamam.account-user=${EDAMAM_ACCOUNT_USER:}

# CREF validation (hybrid)
cref.validation.auto-lookup-enabled=${CREF_AUTO_LOOKUP_ENABLED:false}
cref.validation.auto-lookup-url-template=${CREF_AUTO_LOOKUP_URL_TEMPLATE:}
cref.validation.manual-url-template=${CREF_MANUAL_URL_TEMPLATE:https://www.confef.org.br/confef/registrados/}
cref.validation.auto-timeout-seconds=${CREF_AUTO_LOOKUP_TIMEOUT_SECONDS:8}

