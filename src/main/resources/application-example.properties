spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# application-dev.properties
server.port=${SERVER_PORT:8080}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fitmatch}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.show-sql=${DB_SHOW_SQL:true}

# application-prod.properties
# server.port=${SERVER_PORT:8080}
# spring.datasource.url=${DB_URL}
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.show-sql=${DB_SHOW_SQL:false}

# Edamam Food Database API
diet.edamam.enabled=${EDAMAM_ENABLED:true}
diet.edamam.app-id=${EDAMAM_APP_ID:}
diet.edamam.app-key=${EDAMAM_APP_KEY:}
diet.edamam.base-url=${EDAMAM_BASE_URL:https://api.edamam.com}
diet.edamam.account-user=${EDAMAM_ACCOUNT_USER:}